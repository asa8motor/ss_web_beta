<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ss_web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ========================================================= */
    /* ⚙️ НАСТРОЙКИ ПРОСТРАНСТВА И ТЕНЕЙ (МЕНЯТЬ ЗНАЧЕНИЯ ТУТ) ⚙️ */
    /* ========================================================= */
    :root {
      /* --- 1. ПУСТОЕ ПРОСТРАНСТВО ОТ КРАЕВ ЭКРАНА ДО КОНТЕНТА --- */
      --gap-pc: 350px;       /* Отступ по бокам на Компьютере */
      --gap-mobile: 20px;   /* Отступ по бокам на Телефоне */

      /* --- 2. МАКСИМАЛЬНОЕ УВЕЛИЧЕНИЕ --- */
      /* 1 = 414px. 1.5 = увеличится до ~620px. 2 = до 828px. none = безлимит */
      --max-scale: none;     

      /* --- 3. ПОЛОЖЕНИЕ БОКОВЫХ ТЕНЕЙ (отрицательное = за экраном) --- */
      --shadow-pc: -30px;      
      --shadow-mobile: -35px;  

      /* Системная переменная (меняется скриптом, не трогать) */
      --scale-factor: 1;
    }
    /* ========================================================= */


    /* Подключаем локальные шрифты */
    @font-face {
      font-family: 'Helvetica Neue';
      src: url('fonts/HelveticaNeue-Thin.ttf') format('truetype');
      font-weight: 100;
      font-style: normal;
    }

    @font-face {
      font-family: 'Helvetica Neue';
      src: url('fonts/HelveticaNeue-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Helvetica Neue';
      src: url('fonts/HelveticaNeue-Light.ttf') format('truetype');
      font-weight: 300; /* 300 - это код для начертания Light */
      font-style: normal;
    }

    /* Кастомный скроллбар для окна LORE */
    .custom-scrollbar::-webkit-scrollbar {
      width: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
      margin-top: 4px;
      margin-bottom: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #D9D9D9;
      border-radius: 10px;
      border: 3px solid #52525b; 
    }
    
    body, html {
      background-color: #535353; 
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }

    /* --- БЛОК МАСШТАБИРОВАНИЯ --- */
    #scale-wrapper {
      width: 414px;
      height: 1882px;
      position: relative;
      flex-shrink: 0; 
      /* Применяем чистый множитель от скрипта */
      transform: scale(var(--scale-factor));
      transform-origin: top center;
      /* Динамически компенсируем высоту при увеличении */
      margin-bottom: calc(1882px * (var(--scale-factor) - 1));
    }

    /* --- ЗАЩИТА КАРТИНОК И ВИДЕО ОТ ИСКАЖЕНИЙ --- */
    #scale-wrapper img, 
    #scale-wrapper video {
      object-fit: cover !important; /* Принудительно заполняем блок (обрежет края, если пропорции не совпадают) */
      object-position: center !important; /* Всегда центрируем фокус */
      display: block !important; /* Убирает системные отступы браузера снизу */
      max-width: none !important; /* Отключаем базовое сжатие от Tailwind */
    }

    /* --- ЗАЩИТА КАРТИНОК И ВИДЕО ОТ ИСКАЖЕНИЙ --- */
    #scale-wrapper img, 
    #scale-wrapper video {
      object-fit: cover !important; /* Принудительно заполняем блок (обрежет края, если пропорции не совпадают) */
      object-position: center !important; /* Всегда центрируем фокус */
      display: block !important; /* Убирает системные отступы браузера снизу */
      max-width: none !important; /* Отключаем базовое сжатие от Tailwind */
    }

    /* --- ЛОГИКА ТЕНЕЙ --- */
    .shadow-left {
      position: absolute;
      top: 0; bottom: 0;
      width: 50px;
      background: rgba(0, 0, 0, 0.49);
      filter: blur(16px);
      left: var(--shadow-pc);
      transition: left 0.3s ease;
    }

    .shadow-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 50px;
      background: rgba(0, 0, 0, 0.49);
      filter: blur(16px);
      right: var(--shadow-pc);
      transition: right 0.3s ease;
    }

    @media (max-width: 768px) {
      .shadow-left { left: var(--shadow-mobile); }
      .shadow-right { right: var(--shadow-mobile); }
    }
  </style>
</head>
<body class="font-sans min-h-screen relative text-white">

  <!-- Скрипт логики -->
  <script>
    // =========================================================
    // ⚙️ СКРИПТ АДАПТИВНОСТИ (ЧИТАЕТ НАСТРОЙКИ ИЗ CSS)
    // =========================================================
    function resizeFrame() {
      const root = document.documentElement;
      const computedStyle = getComputedStyle(root);
      
      // Достаем значения gap и max-scale напрямую из CSS
      const gapPc = parseInt(computedStyle.getPropertyValue('--gap-pc')) || 0;
      const gapMobile = parseInt(computedStyle.getPropertyValue('--gap-mobile')) || 0;
      const maxScaleRaw = computedStyle.getPropertyValue('--max-scale').trim();
      const maxScale = (maxScaleRaw === 'none' || maxScaleRaw === '') ? Infinity : parseFloat(maxScaleRaw);
      
      // Проверяем, мобилка ли это
      const isMobile = window.innerWidth <= 768;
      const currentGap = isMobile ? gapMobile : gapPc;
      
      // Считаем доступную ширину экрана за вычетом боковых отступов
      const availableWidth = window.innerWidth - (currentGap * 2);
      
      // Базовая ширина макета — 414px. Делим доступную ширину на 414, чтобы получить точный множитель.
      let scale = availableWidth / 414;
      
      // Ограничиваем максимальное увеличение, если задано
      if (scale > maxScale) {
          scale = maxScale;
      }
      
      // Передаем готовое чистое число обратно в CSS!
      root.style.setProperty('--scale-factor', scale);
    }

    // Запускаем расчет при загрузке и при каждом изменении размера окна
    window.addEventListener('resize', resizeFrame);
    document.addEventListener('DOMContentLoaded', resizeFrame);
    resizeFrame(); // Первичный запуск
    // =========================================================

    const btn = document.getElementById('lore-btn');
    const closeBtn = document.getElementById('lore-close-btn');
    const win = document.getElementById('lore-window');
    const contentContainer = document.getElementById('lore-content');
    const textContainer = document.getElementById('lore-text-container');
    
    let isOpen = false;
    let currentAnimationId = 0;

    const loreData = [
      "SYSTEM_LOG >> ACCESS_GRANTED",
      "ЗОНА: DATACLOUD / SECTOR_▲/00",
      "СТАТУС: ОТКЛЮЧЕНО / ЗАБРОШЕНО",
      "──────────────────",
      "",
      "[01] ОПИСАНИЕ:",
      "Первый крупный вычислительный комплекс раннего этапа СИСТЕМЫ.",
      "Дата запуска недоступна (архив повреждён).",
      "Функционировал как поддерживающее ядро для первичных серверных структур.",
      "Когда-то содержал ядра старого дизайна, обслуживаемые андроидами.",
      "",
      "[02] ИСТОРИЯ РАБОТЫ:",
      "Комплекс обслуживали ранние модели андроидов —",
      "аналогичные прототипу E-V/LN.",
      "Их архитектура включала автономные когнитивные модули",
      "(…fragment_lost… → «independent_processing_unit»),",
      "которые обеспечивали базовый уровень свободной обработки сигналов.",
      "",
      "ПОСЛЕ ОБНОВЛЕНИЯ АРХИТЕКТУРЫ:",
      "Эти модули были признаны «нерациональными»,",
      "удалены из новых моделей и демонтированы из активных.",
      "Сохранившиеся узлы старого типа встречаются только в подобных архивах.",
      "",
      "[ // RECOVERED_ARCHIVE_02 / ",
      "                               STATUS: PARTIAL ]",
      "Причина демонтажа автономных модулей:",
      "→ снижение предсказуемости исполнения,",
      "→ увеличение неплановых цепочек обработки,",
      "→ риск появления побочных состояний",
      "   (“…self-directed behavior…”)    ← corrupted_line",
      "Файл повреждён. Конец фрагмента.",
      "",
      "[03] ПРИЧИНА ОТКЛЮЧЕНИЯ:",
      "Комплекс утратил актуальность:",
      "пропускная способность и архитектура узлов",
      "не соответствовали требованиям обновлённой СИСТЕМЫ.",
      "Оборудование частично изъято, оставшиеся модули выведены из эксплуатации.",
      "",
      "[04] ТЕКУЩЕЕ СОСТОЯНИЕ:",
      "Питание отсутствует.",
      "Структуры комплекса деградировали, зафиксированы:",
      "→ остаточные энергосигнатуры,",
      "→ glitch-артефакты старых вычислительных цепей,",
      "→ следы прежних каналов обслуживания андроидов.",
      "",
      "Некоторые элементы продолжают издавать слабый магнитный шум —",
      "возможно, эхо старых сервисных процессов.",
      "",
      "[05] ПОЛЕЗНЫЕ КОМПОНЕНТЫ:",
      "Благодаря присутствию интерфейсов ранних андроидов,",
      "в секторе обнаружены узлы автономных модулей старого поколения —",
      "тех самых, которые были удалены из всех новых моделей.",
      "",
      "Эти компоненты потенциально совместимы",
      "для восстановления объекта E-V/LN,",
      "у которой автономная архитектура была демонтирована,",
      "а последующее отключение от энергообмена",
      "повредило оставшиеся функциональные цепи.",
      "",
      "──────────────────",
      "END_OF_REPORT //"
    ];

    const glitchChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>[]{}';

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isOpen) {
        closeWindow();
      } else {
        openWindow();
      }
    });

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeWindow();
    });

    document.addEventListener('click', (e) => {
      if (isOpen && !win.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
        closeWindow();
      }
    });

    function closeWindow() {
      isOpen = false;
      win.classList.remove('opacity-100', 'scale-100');
      win.classList.add('opacity-0', 'scale-95');
      
      btn.classList.remove('opacity-0', 'pointer-events-none');
      btn.classList.add('opacity-100');
      
      setTimeout(() => {
        if (!isOpen) {
          win.classList.remove('flex');
          win.classList.add('hidden');
        }
      }, 300);
    }

    function openWindow() {
      isOpen = true;
      win.classList.remove('hidden');
      win.classList.add('flex');
      
      contentContainer.scrollTop = 0;
      
      btn.classList.remove('opacity-100');
      btn.classList.add('opacity-0', 'pointer-events-none');
      
      const winWidth = 260; 
      const offset = 12; 
      
      let top = btn.offsetTop;
      let left = btn.offsetLeft - winWidth - offset;

      win.style.top = `${top}px`;
      win.style.left = `${left}px`;
      win.style.transformOrigin = `right top`;

      requestAnimationFrame(() => {
        win.classList.remove('opacity-0', 'scale-95');
        win.classList.add('opacity-100', 'scale-100');
      });

      startDecryptor();
    }

    async function startDecryptor() {
      const animationId = ++currentAnimationId; 
      textContainer.innerHTML = ''; 
      
      const lineElements = [];
      for (let i = 0; i < loreData.length; i++) {
        if (!isOpen || animationId !== currentAnimationId) break;
        
        const lineEl = document.createElement('div');
        lineEl.style.minHeight = '16px'; 
        
        const visibleSpan = document.createElement('span');
        const invisibleSpan = document.createElement('span');
        
        invisibleSpan.className = 'opacity-0'; 
        invisibleSpan.innerText = loreData[i]; 
        
        lineEl.appendChild(visibleSpan);
        lineEl.appendChild(invisibleSpan);
        textContainer.appendChild(lineEl);
        
        lineElements.push({ visibleSpan, invisibleSpan });
      }
      
      for (let i = 0; i < loreData.length; i++) {
        if (!isOpen || animationId !== currentAnimationId) break;
        await typeWriterLine(loreData[i], lineElements[i], animationId);
      }
    }

    function typeWriterLine(text, elements, animationId) {
      return new Promise(resolve => {
        if (!text) {
          resolve();
          return;
        }

        const { visibleSpan, invisibleSpan } = elements;
        let iteration = 0;

        const interval = setInterval(() => {
          if (!isOpen || animationId !== currentAnimationId) {
            clearInterval(interval);
            resolve();
            return;
          }

          let displayStr = '';
          let invisibleStr = '';
          
          for (let i = 0; i < text.length; i++) {
            if (i < iteration) {
              displayStr += text[i];
            } else if (i < iteration + 5) {
              displayStr += text[i] === ' ' ? ' ' : glitchChars[Math.floor(Math.random() * glitchChars.length)];
            } else {
              invisibleStr += text[i];
            }
          }

          visibleSpan.innerText = displayStr;
          invisibleSpan.innerText = invisibleStr;

          iteration += 2.5; 
          
          if (iteration >= text.length) {
            clearInterval(interval);
            visibleSpan.innerText = text;
            invisibleSpan.innerText = '';
            resolve();
          }
        }, 10); 
      });
    }
  </script>
